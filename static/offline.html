<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>
		<meta
			name="theme-color"
			content="#0b3b60"
		/>
		<title>Segoya — Offline</title>
		<style>
			:root {
				color-scheme: dark;
				font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
				background: #071e2f;
				color: #f4f4f5;
			}
			body {
				display: grid;
				min-height: 100vh;
				margin: 0;
				place-items: center;
			}
			main {
				max-width: 32rem;
				padding: 2rem;
				text-align: center;
			}
			img {
				width: 8rem;
				height: 8rem;
				border-radius: 1.75rem;
			}
			h1 {
				margin: 1.5rem 0 0.5rem;
			}
			p {
				color: #bae6fd;
				line-height: 1.6;
			}
			a {
				display: inline-block;
				margin-top: 1rem;
				padding: 0.75rem 1.25rem;
				border-radius: 0.5rem;
				background: #f59e0b;
				color: #071e2f;
				font-weight: 700;
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<main>
			<img
				src="/icons/pwa-192.png"
				alt=""
			/>
			<h1>You’re offline</h1>
			<p>Segoya needs a connection to load panoramas and game data.</p>
			<a href="/">Try again</a>
		</main>
	</body>
</html>
